<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pylos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1e1e24; font-family: system-ui, sans-serif; color: #eee; }
    canvas { display: block; }

    /* Setup screen */
    #setup { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center;
             justify-content: center; background: rgba(10,10,14,0.95); z-index: 100; }
    #setup h1 { font-size: 3rem; margin-bottom: 1rem; letter-spacing: 0.3em; }
    #setup .subtitle { color: #888; margin-bottom: 2rem; }
    #setup .player-config { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2rem; }
    #setup .side-pick { display: flex; align-items: center; gap: 1rem; }
    #setup .side-label { width: 120px; text-align: right; color: #aaa; font-size: 0.95rem; }
    #setup .toggle-group { display: flex; gap: 0; }
    #setup .toggle-group button { padding: 0.5rem 1.4rem; border: 1px solid #555; background: #2a2a30;
                                   color: #999; font-size: 0.9rem; cursor: pointer; }
    #setup .toggle-group button:first-child { border-radius: 6px 0 0 6px; }
    #setup .toggle-group button:last-child { border-radius: 0 6px 6px 0; border-left: none; }
    #setup .toggle-group button.selected { border-color: #8f8; background: #2a3a2a; color: #cfc; }
    #setup #startBtn { padding: 0.8rem 3rem; border: none; border-radius: 8px;
                       background: #2a6a2a; color: #cfc; font-size: 1.2rem; cursor: pointer; }
    #setup #startBtn:hover { background: #3a8a3a; }
    #setup #resumeBtn { padding: 0.8rem 3rem; border: 1px solid #555; border-radius: 8px;
                        background: #2a2a30; color: #ccc; font-size: 1.2rem; cursor: pointer; margin-top: 0.8rem; }
    #setup #resumeBtn:hover { background: #3a3a40; }

    /* HUD panels */
    .hud { position: fixed; background: rgba(12,12,16,0.88); border-radius: 8px; padding: 12px; font-size: 13px; z-index: 10; }
    #gamePanel { top: 12px; right: 12px; min-width: 180px; }
    #gamePanel .status { color: #8f8; margin-bottom: 8px; min-height: 1.4em; }
    #gamePanel .btns { display: flex; gap: 6px; flex-wrap: wrap; }
    #gamePanel button { padding: 5px 12px; border: 1px solid #555; border-radius: 4px;
                        background: #2a2a30; color: #eee; cursor: pointer; font-size: 12px; }
    #gamePanel button:hover { background: #3a3a40; }
    #gamePanel button:disabled { opacity: 0.3; cursor: default; }

    #logPanel { bottom: 12px; right: 12px; min-width: 200px; max-height: 50vh; }
    #logPanel .header { cursor: pointer; user-select: none; display: flex; justify-content: space-between; }
    #logPanel .entries { margin-top: 6px; max-height: 35vh; overflow-y: auto; }
    #logPanel .entries div { padding: 2px 0; color: #999; border-bottom: 1px solid #222; font-size: 12px; }

    #viewPanel { bottom: 12px; left: 12px; }
    #viewPanel label { display: block; margin-bottom: 6px; color: #888; }
    #viewPanel input[type=range] { width: 140px; }

    /* Victory overlay */
    #victoryOverlay { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center;
                      justify-content: center; z-index: 200; background: rgba(5,5,8,0); transition: background 1s; }
    #victoryOverlay.show { display: flex; background: rgba(5,5,8,0.82); }
    #victoryOverlay .victory-content { text-align: center; transform: scale(0.5); opacity: 0;
                                        transition: transform 0.6s cubic-bezier(.17,.67,.29,1.3), opacity 0.6s; }
    #victoryOverlay.show .victory-content { transform: scale(1); opacity: 1; }
    #victoryOverlay .trophy { font-size: 5rem; margin-bottom: 0.5rem;
                               animation: none; }
    #victoryOverlay.show .trophy { animation: trophy-bounce 0.8s ease 0.3s both; }
    @keyframes trophy-bounce {
      0% { transform: translateY(-40px) scale(0.3); opacity: 0; }
      50% { transform: translateY(10px) scale(1.1); }
      70% { transform: translateY(-5px) scale(0.95); }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }
    #victoryOverlay h2 { font-size: 2.4rem; margin-bottom: 0.4rem; letter-spacing: 0.1em; }
    #victoryOverlay h2.win { color: #8f8; }
    #victoryOverlay h2.lose { color: #f88; }
    #victoryOverlay p { color: #999; margin-bottom: 2rem; font-size: 1.1rem; }
    #playAgainBtn { padding: 0.8rem 3rem; border: none; border-radius: 8px;
                    background: #2a6a2a; color: #cfc; font-size: 1.2rem; cursor: pointer; }
    #playAgainBtn:hover { background: #3a8a3a; }
  </style>
</head>
<body>
  <!-- Setup screen -->
  <div id="setup">
    <h1>PYLOS</h1>
    <div class="subtitle">Assign players</div>
    <div class="player-config">
      <div class="side-pick">
        <span class="side-label">Light (first)</span>
        <div class="toggle-group" id="lightToggle">
          <button class="selected" data-val="human">Human</button>
          <button data-val="ai">AI</button>
        </div>
      </div>
      <div class="side-pick">
        <span class="side-label">Dark (second)</span>
        <div class="toggle-group" id="darkToggle">
          <button data-val="human">Human</button>
          <button class="selected" data-val="ai">AI</button>
        </div>
      </div>
    </div>
    <button id="startBtn">START</button>
    <button id="resumeBtn" style="display:none;">Resume Game</button>
  </div>

  <!-- HUD -->
  <div id="gamePanel" class="hud" style="display:none;">
    <div class="status" id="statusText">Your turn</div>
    <div class="btns">
      <button id="undoBtn">Undo</button>
      <button id="redoBtn">Redo</button>
      <button id="pauseBtn" style="display:none;">Pause</button>
      <button id="passBtn" style="display:none;">Pass take-back</button>
      <button id="menuBtn">Menu</button>
    </div>
  </div>

  <div id="logPanel" class="hud" style="display:none;">
    <div class="header"><span>Move Log</span><span id="logToggle">[-]</span></div>
    <div class="entries" id="logEntries"></div>
  </div>

  <div id="viewPanel" class="hud" style="display:none;">
  </div>

  <!-- Victory overlay -->
  <div id="victoryOverlay">
    <div class="victory-content">
      <div class="trophy">🏆</div>
      <h2 id="victoryTitle"></h2>
      <p id="victorySubtitle"></p>
      <button id="playAgainBtn">Play Again</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
